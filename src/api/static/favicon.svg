<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <clipPath id="hex">
      <polygon points="50,4 93,27.5 93,72.5 50,96 7,72.5 7,27.5"/>
    </clipPath>
  </defs>

  <!-- Dark hex background -->
  <polygon points="50,4 93,27.5 93,72.5 50,96 7,72.5 7,27.5" fill="#111827"/>

  <!-- Red top half tint -->
  <rect x="0" y="0" width="100" height="50" fill="#e84142" opacity="0.12" clip-path="url(#hex)"/>

  <!-- Teal bottom half tint -->
  <rect x="0" y="50" width="100" height="50" fill="#00c8a0" opacity="0.12" clip-path="url(#hex)"/>

  <!-- Hex border -->
  <polygon points="50,4 93,27.5 93,72.5 50,96 7,72.5 7,27.5" fill="none" stroke="#333d52" stroke-width="2"/>

  <!-- Subtle center divider -->
  <line x1="7" y1="50" x2="93" y2="50" stroke="#ffffff" stroke-width="0.5" opacity="0.1"/>

  <!-- D in red -->
  <text x="30" y="62" font-family="'Courier New', Courier, monospace" font-weight="700" font-size="46" fill="#e84142" text-anchor="middle">D</text>

  <!-- 2 in teal -->
  <text x="70" y="62" font-family="'Courier New', Courier, monospace" font-weight="700" font-size="46" fill="#00c8a0" text-anchor="middle">2</text>
</svg>
