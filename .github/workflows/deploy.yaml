name: CI/CD pipeline

on:
  push:
    branches:
      - dev
  workflow_dispatch:
    inputs:
      force_rebuild:
        description: 'Force rebuild all images'
        type: boolean
        default: false

jobs:
  check-base:
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.check.outputs.changed }}
      force: ${{ steps.check.outputs.force }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Debug base change check
        run: |
          echo "Changed files:"
          git diff --name-only HEAD~1 HEAD
          echo "HEAD~1 exists:"
          git rev-parse HEAD~1 || echo "no HEAD~1"
      - name: Check if base change
        id: check
        run: |
          FORCE="${{ github.event.inputs.force_rebuild }}"
          echo "force=$FORCE" >> $GITHUB_OUTPUT
          if [ "$FORCE" == "true" ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
          elif ! git rev-parse HEAD~1 >/dev/null 2>&1; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            git diff --name-only HEAD~1 HEAD | grep -q "Dockerfile.base\|requirements-base.txt" \
              && echo "changed=true" >> $GITHUB_OUTPUT \
              || echo "changed=false" >> $GITHUB_OUTPUT
          fi

  test:
    runs-on: ubuntu-latest
    needs: check-base
    if: always() && needs.check-base.result == 'success'
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r build/requirements-base.txt
          pip install -r build/requirements-api.txt
          pip install -r build/requirements-fetcher.txt
          pip install -r build/requirements-test.txt
          pip install pytest-cov 

      - name: Audit Python dependencies
        run: |
          pip install pip-audit
          pip-audit -r build/requirements-base.txt
          pip-audit -r build/requirements-api.txt
          pip-audit -r build/requirements-fetcher.txt
          pip-audit -r build/requirements-test.txt

      - name: Run tests
        run: pytest tests/ -v --cov=src --cov-fail-under=50

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@v5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  build-base:
    runs-on: ubuntu-latest
    needs: [check-base, test]
    if: needs.check-base.outputs.changed == 'true' && needs.test.result == 'success'
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build and Push Base Image with Tensorflow
        uses: docker/build-push-action@v5
        with:
          context: .
          file: build/Dockerfile.base
          push: true
          platforms: linux/amd64
          # provenance=false prevents an attestation manifest with platform=unknown/unknown
          # from being pushed alongside the real image. Without this, Kind's container
          # runtime gets confused by the unknown platform entry and fails to pull the image.
          provenance: false
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/dota2metalab-base:latest
          cache-from: type=gha,scope=base
          cache-to: type=gha,mode=max
      - name: Trivy Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ secrets.DOCKERHUB_USERNAME }}/dota2metalab-base:latest
          format: table
          severity: CRITICAL,HIGH
          exit-code: 1

  check-fetcher:
    runs-on: ubuntu-latest
    needs: [build-base, check-base, test]
    if: always() && needs.test.result == 'success' && (needs.build-base.result == 'success' || needs.build-base.result == 'skipped')
    outputs:
      changed: ${{ steps.check.outputs.changed }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
        with:
          fetch-depth: 2
      - name: Check if fetcher change
        id: check
        run: |
          FORCE="${{ needs.check-base.outputs.force }}"
          if [ "$FORCE" == "true" ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
          elif ! git rev-parse HEAD~1 >/dev/null 2>&1; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            git diff --name-only HEAD~1 HEAD | grep -q "build/Dockerfile.fetcher\|build/requirements-fetcher\|scripts/store_database.py" \
              && echo "changed=true" >> $GITHUB_OUTPUT \
              || echo "changed=false" >> $GITHUB_OUTPUT
          fi

  check-api:
    runs-on: ubuntu-latest
    needs: [check-fetcher, check-base]
    if: always() && needs.check-fetcher.result == 'success'
    outputs:
      changed: ${{ steps.check.outputs.changed }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
        with:
          fetch-depth: 2
      - name: Check if api change
        id: check
        run: |
          FORCE="${{ needs.check-base.outputs.force }}"
          if [ "$FORCE" == "true" ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
          elif ! git rev-parse HEAD~1 >/dev/null 2>&1; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            git diff --name-only HEAD~1 HEAD | grep -q "build/Dockerfile.api\|build/requirements-api\|src/api/" \
              && echo "changed=true" >> $GITHUB_OUTPUT \
              || echo "changed=false" >> $GITHUB_OUTPUT
          fi

  check-trainer:
    runs-on: ubuntu-latest
    needs: [check-fetcher, check-base]
    if: always() && needs.check-fetcher.result == 'success'
    outputs:
      changed: ${{ steps.check.outputs.changed }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
        with:
          fetch-depth: 2
      - name: Check if trainer change
        id: check
        run: |
          FORCE="${{ needs.check-base.outputs.force }}"
          if [ "$FORCE" == "true" ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
          elif ! git rev-parse HEAD~1 >/dev/null 2>&1; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            git diff --name-only HEAD~1 HEAD | grep -q "build/Dockerfile.trainer\|build/requirements-trainer\|scripts/train_model.py" \
              && echo "changed=true" >> $GITHUB_OUTPUT \
              || echo "changed=false" >> $GITHUB_OUTPUT
          fi

  generate-tag:
    runs-on: ubuntu-latest
    needs: [check-api, check-trainer, check-fetcher]
    if: |
      always() &&
      (needs.check-api.outputs.changed == 'true' || needs.check-trainer.outputs.changed == 'true' || needs.check-fetcher.outputs.changed == 'true')
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
      - name: Generate image tag
        id: tag
        run: |
          SHORT_SHA=$(git rev-parse --short HEAD)
          TIMESTAMP=$(date +%Y%m%d%H%M%S)
          echo "tag=${TIMESTAMP}-${SHORT_SHA}" >> $GITHUB_OUTPUT
          echo "Generated tag: ${TIMESTAMP}-${SHORT_SHA}"

  build-api:
    runs-on: ubuntu-latest
    needs: [check-api, check-fetcher, generate-tag]
    if: always() && needs.check-fetcher.result == 'success' && needs.check-api.outputs.changed == 'true' && needs.generate-tag.result == 'success'
    outputs:
      tag: ${{ needs.generate-tag.outputs.tag }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build and Push API Images
        uses: docker/build-push-action@v5
        with:
          context: .
          file: build/Dockerfile.api
          push: true
          platforms: linux/amd64
          # provenance=false prevents an attestation manifest with platform=unknown/unknown
          # from being pushed alongside the real image. Without this, Kind's container
          # runtime gets confused by the unknown platform entry and fails to pull the image.
          provenance: false
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/dota2metalab-api:${{ needs.generate-tag.outputs.tag }}
            ${{ secrets.DOCKERHUB_USERNAME }}/dota2metalab-api:latest
          cache-from: type=gha,scope=api
          cache-to: type=gha,mode=max
      - name: Trivy Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ secrets.DOCKERHUB_USERNAME }}/dota2metalab-api:${{ needs.generate-tag.outputs.tag }}
          format: table
          severity: CRITICAL,HIGH
          exit-code: 1

  build-trainer:
    runs-on: ubuntu-latest
    needs: [check-trainer, check-fetcher, generate-tag]
    if: always() && needs.check-fetcher.result == 'success' && needs.check-trainer.outputs.changed == 'true' && needs.generate-tag.result == 'success'
    outputs:
      tag: ${{ needs.generate-tag.outputs.tag }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build and Push Trainer Images
        uses: docker/build-push-action@v5
        with:
          context: .
          file: build/Dockerfile.trainer
          push: true
          platforms: linux/amd64
          # provenance=false prevents an attestation manifest with platform=unknown/unknown
          # from being pushed alongside the real image. Without this, Kind's container
          # runtime gets confused by the unknown platform entry and fails to pull the image.
          provenance: false
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/dota2metalab-trainer:${{ needs.generate-tag.outputs.tag }}
            ${{ secrets.DOCKERHUB_USERNAME }}/dota2metalab-trainer:latest
          cache-from: type=gha,scope=trainer
          cache-to: type=gha,mode=max
      - name: Trivy Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ secrets.DOCKERHUB_USERNAME }}/dota2metalab-trainer:${{ needs.generate-tag.outputs.tag }}
          format: table
          severity: CRITICAL,HIGH
          exit-code: 1

  build-fetcher:
    runs-on: ubuntu-latest
    needs: [check-fetcher, generate-tag]
    if: always() && needs.check-fetcher.result == 'success' && needs.check-fetcher.outputs.changed == 'true' && needs.generate-tag.result == 'success'
    outputs:
      tag: ${{ needs.generate-tag.outputs.tag }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build and Push Fetcher Images
        uses: docker/build-push-action@v5
        with:
          context: .
          file: build/Dockerfile.fetcher
          push: true
          platforms: linux/amd64
          # provenance=false prevents an attestation manifest with platform=unknown/unknown
          # from being pushed alongside the real image. Without this, Kind's container
          # runtime gets confused by the unknown platform entry and fails to pull the image.
          provenance: false
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/dota2metalab-fetcher:${{ needs.generate-tag.outputs.tag }}
            ${{ secrets.DOCKERHUB_USERNAME }}/dota2metalab-fetcher:latest
          cache-from: type=gha,scope=fetcher
          cache-to: type=gha,mode=max
      - name: Trivy Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ secrets.DOCKERHUB_USERNAME }}/dota2metalab-fetcher:${{ needs.generate-tag.outputs.tag }}
          format: table
          severity: CRITICAL,HIGH
          exit-code: 1

  deploy-dev:
    runs-on: ubuntu-latest
    needs: [build-api, build-trainer, build-fetcher, generate-tag]
    if: |
      always() &&
      (needs.build-api.result == 'success' || needs.build-api.result == 'skipped') &&
      (needs.build-trainer.result == 'success' || needs.build-trainer.result == 'skipped') &&
      (needs.build-fetcher.result == 'success' || needs.build-fetcher.result == 'skipped') &&
      (needs.build-api.result == 'success' || needs.build-trainer.result == 'success' || needs.build-fetcher.result == 'success')
    steps:
      - name: Checkout infra repo
        uses: actions/checkout@v6
        with:
          repository: rinavillaruz/dota2metalab-infra
          token: ${{ secrets.INFRA_DEPLOY_TOKEN }}
          ref: dev
      - name: Install yq
        run: |
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq
      - name: Update image tags in values-dev.yaml
        run: |
          IMAGE_TAG="${{ needs.generate-tag.outputs.tag }}"
          echo "Updating values-dev.yaml with tag: $IMAGE_TAG"

          # Only update the tag for images that were actually built.
          # Each service has its own tag — skipped builds keep their existing tag.
          if [ "${{ needs.build-api.result }}" == "success" ]; then
            yq e ".image.api.tag = \"$IMAGE_TAG\"" -i deploy/helm/values-dev.yaml
            echo "Updated api tag to $IMAGE_TAG"
          fi

          if [ "${{ needs.build-fetcher.result }}" == "success" ]; then
            yq e ".image.fetcher.tag = \"$IMAGE_TAG\"" -i deploy/helm/values-dev.yaml
            echo "Updated fetcher tag to $IMAGE_TAG"
          fi

          if [ "${{ needs.build-trainer.result }}" == "success" ]; then
            yq e ".image.trainer.tag = \"$IMAGE_TAG\"" -i deploy/helm/values-dev.yaml
            echo "Updated trainer tag to $IMAGE_TAG"
          fi

          git config user.email "142535552+rinavillaruz@users.noreply.github.com"
          git config user.name "rinavillaruz"
          git add deploy/helm/values-dev.yaml
          git diff --cached --quiet || git commit -m "ci: update image tags [skip ci]
          $([ "${{ needs.build-api.result }}" == "success" ] && echo "- api: $IMAGE_TAG")
          $([ "${{ needs.build-fetcher.result }}" == "success" ] && echo "- fetcher: $IMAGE_TAG")
          $([ "${{ needs.build-trainer.result }}" == "success" ] && echo "- trainer: $IMAGE_TAG")"
          git push origin HEAD:dev

  deploy-staging:
    runs-on: ubuntu-latest
    needs: [deploy-dev, generate-tag]
    environment: staging
    if: needs.deploy-dev.result == 'success'
    steps:
      - name: Checkout infra repo
        uses: actions/checkout@v6
        with:
          repository: rinavillaruz/dota2metalab-infra
          token: ${{ secrets.INFRA_DEPLOY_TOKEN }}
          ref: staging

      - name: Install yq
        run: |
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

      - name: Update image tags in values-staging.yaml
        run: |
          IMAGE_TAG="${{ needs.generate-tag.outputs.tag }}"
          echo "Updating values-staging.yaml with tag: $IMAGE_TAG"

          yq e ".image.api.tag = \"$IMAGE_TAG\"" -i deploy/helm/values-staging.yaml
          yq e ".image.fetcher.tag = \"$IMAGE_TAG\"" -i deploy/helm/values-staging.yaml
          yq e ".image.trainer.tag = \"$IMAGE_TAG\"" -i deploy/helm/values-staging.yaml

          git config user.email "142535552+rinavillaruz@users.noreply.github.com"
          git config user.name "rinavillaruz"
          git add deploy/helm/values-staging.yaml
          git diff --cached --quiet || git commit -m "ci: update staging image tags [skip ci]"
          git push origin HEAD:staging