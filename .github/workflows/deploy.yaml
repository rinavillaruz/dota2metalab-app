name: CI/CD pipeline

on:
  push:
    branches:
      - dev
  workflow_dispatch:
    inputs:
      force_rebuild:
        description: 'Force rebuild all images'
        type: boolean
        default: false

jobs:
  check-base:
    runs-on: self-hosted
    outputs:
      changed: ${{ steps.check.outputs.changed }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - name: Debug base change check
        run: |
          echo "Changed files:"
          git diff --name-only HEAD~1 HEAD
          echo "HEAD~1 exists:"
          git rev-parse HEAD~1 || echo "no HEAD~1"
      - name: Check if base change
        id: check
        run: |
          if [ "${{ github.event.inputs.force_rebuild }}" == "true" ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
          elif ! git rev-parse HEAD~1 >/dev/null 2>&1; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            git diff --name-only HEAD~1 HEAD | grep -q "Dockerfile.base\|requirements-base.txt" \
              && echo "changed=true" >> $GITHUB_OUTPUT \
              || echo "changed=false" >> $GITHUB_OUTPUT
          fi

  build-base:
    runs-on: self-hosted
    needs: check-base
    if: needs.check-base.outputs.changed == 'true'
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build and Push Base Image with Tensorflow
        uses: docker/build-push-action@v5
        with:
          context: .
          file: build/Dockerfile.base
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/dota2metalab-base:latest
          cache-from: type=gha,scope=base
          cache-to: type=gha,mode=max

  check-fetcher:
    runs-on: self-hosted
    needs: [build-base, check-base]
    if: always() && (needs.build-base.result == 'success' || needs.build-base.result == 'skipped')
    outputs:
      changed: ${{ steps.check.outputs.changed }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - name: Debug base change check
        run: |
          echo "Changed files:"
          git diff --name-only HEAD~1 HEAD
          echo "HEAD~1 exists:"
          git rev-parse HEAD~1 || echo "no HEAD~1"
      - name: Check if fetcher change
        id: check
        run: |
          if [ "${{ github.event.inputs.force_rebuild }}" == "true" ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
          elif ! git rev-parse HEAD~1 >/dev/null 2>&1; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            git diff --name-only HEAD~1 HEAD | grep -q "build/Dockerfile.fetcher\|build/requirements-fetcher\|scripts/store_database.py" \
              && echo "changed=true" >> $GITHUB_OUTPUT \
              || echo "changed=false" >> $GITHUB_OUTPUT
          fi

  check-api:
    runs-on: self-hosted
    needs: check-fetcher
    if: always() && needs.check-fetcher.result == 'success'
    outputs:
      changed: ${{ steps.check.outputs.changed }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - name: Debug base change check
        run: |
          echo "Changed files:"
          git diff --name-only HEAD~1 HEAD
          echo "HEAD~1 exists:"
          git rev-parse HEAD~1 || echo "no HEAD~1"
      - name: Check if api change
        id: check
        run: |
          if [ "${{ github.event.inputs.force_rebuild }}" == "true" ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
          elif ! git rev-parse HEAD~1 >/dev/null 2>&1; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            git diff --name-only HEAD~1 HEAD | grep -q "build/Dockerfile.api\|build/requirements-api\|src/api/" \
              && echo "changed=true" >> $GITHUB_OUTPUT \
              || echo "changed=false" >> $GITHUB_OUTPUT
          fi

  check-trainer:
    runs-on: self-hosted
    needs: check-fetcher
    if: always() && needs.check-fetcher.result == 'success'
    outputs:
      changed: ${{ steps.check.outputs.changed }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - name: Debug base change check
        run: |
          echo "Changed files:"
          git diff --name-only HEAD~1 HEAD
          echo "HEAD~1 exists:"
          git rev-parse HEAD~1 || echo "no HEAD~1"
      - name: Check if trainer change
        id: check
        run: |
          if [ "${{ github.event.inputs.force_rebuild }}" == "true" ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
          elif ! git rev-parse HEAD~1 >/dev/null 2>&1; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            git diff --name-only HEAD~1 HEAD | grep -q "build/Dockerfile.trainer\|build/requirements-trainer\|scripts/train_model.py" \
              && echo "changed=true" >> $GITHUB_OUTPUT \
              || echo "changed=false" >> $GITHUB_OUTPUT
          fi

  build-api:
    runs-on: self-hosted
    needs: [check-api, check-fetcher]
    if: always() && (needs.check-fetcher.result == 'success') && needs.check-api.outputs.changed == 'true'
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build and Push API Images
        uses: docker/build-push-action@v5
        with:
          context: .
          file: build/Dockerfile.api
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/dota2metalab-api:${{ github.sha }}
            ${{ secrets.DOCKERHUB_USERNAME }}/dota2metalab-api:latest
          cache-from: type=gha,scope=api
          cache-to: type=gha,mode=max

  build-trainer:
    runs-on: self-hosted
    needs: [check-trainer, check-fetcher]
    if: always() && (needs.check-fetcher.result == 'success') && needs.check-trainer.outputs.changed == 'true'
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build and Push Trainer Images
        uses: docker/build-push-action@v5
        with:
          context: .
          file: build/Dockerfile.trainer
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/dota2metalab-trainer:${{ github.sha }}
            ${{ secrets.DOCKERHUB_USERNAME }}/dota2metalab-trainer:latest
          cache-from: type=gha,scope=trainer
          cache-to: type=gha,mode=max

  build-fetcher:
    runs-on: self-hosted
    needs: check-fetcher
    if: always() && (needs.check-fetcher.result == 'success') && needs.check-fetcher.outputs.changed == 'true'
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build and Push Fetcher Images
        uses: docker/build-push-action@v5
        with:
          context: .
          file: build/Dockerfile.fetcher
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/dota2metalab-fetcher:${{ github.sha }}
            ${{ secrets.DOCKERHUB_USERNAME }}/dota2metalab-fetcher:latest
          cache-from: type=gha,scope=fetcher
          cache-to: type=gha,mode=max

  deploy-dev:
    runs-on: self-hosted
    needs: [build-api, build-trainer, build-fetcher]
    permissions:
      contents: write
    if: always() && (needs.build-api.result == 'success' || needs.build-trainer.result == 'success' || needs.build-fetcher.result == 'success')
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update image tag in values-dev.yaml
        run: |
          IMAGE_TAG="${{ github.sha }}"
          echo "Updating values-dev.yaml with tag: $IMAGE_TAG"

          perl -i -pe "s/tag:.*/tag: $IMAGE_TAG/" deploy/helm/values-dev.yaml

          git config user.email "142535552+rinavillaruz@users.noreply.github.com"
          git config user.name "rinavillaruz"
          git add deploy/helm/values-dev.yaml
          git commit -m "ci: update image tag to $IMAGE_TAG"
          git push origin HEAD:dev